
services:
  app:
    build: .
    # GPU를 도커가 인식하게 만드는 핵심 설정
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - .:/app
    # 만약 웹 화면(Streamlit 등)이 있다면 아래 포트 주석 해제
    # ports:
    #   - "8501:8501"